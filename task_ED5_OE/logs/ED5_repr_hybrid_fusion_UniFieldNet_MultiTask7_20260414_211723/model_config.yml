name: "UniFieldNet"
head_input_dim: 64

equiformer_args:
  irreps_in: "5x0e"
  irreps_node_embedding: "256x0e+128x1e+64x2e"
  num_layers: 8
  irreps_node_attr: "1x0e"
  irreps_sh: "1x0e+1x1o+1x2e+1x3o"
  max_radius: 5.0
  number_of_basis: 256
  basis_type: "gaussian"
  fc_neurons: [128, 128]
  irreps_feature: "1024x0e"
  irreps_head: "64x0e+32x1e+16x2e"
  num_heads: 8
  output_dim: 64  # Equiformer提取后的单头维度


ptv3_args:
  in_channels: 1
  # 1. 削减层级 (4阶段)：防止分子点云被下采样到消失，保留更多空间结构
  enc_depths: [2, 2, 4, 2] 
  # 2. 降低通道数：对于单通道的标量密度场输入，不需要 512 这么冗余的通道，容易过拟合
  enc_channels: [32, 64, 128, 256]
  # 3. 匹配解码器通道：与编码器对称
  dec_channels: [32, 64, 128] 
  # 4. 减小 Patch Size：强迫模型关注更细粒度的局部梯度
  patch_size: 64  # 或者尝试 32