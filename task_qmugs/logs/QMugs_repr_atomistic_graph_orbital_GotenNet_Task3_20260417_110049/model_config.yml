name: "GotenNet"
hidden_channels: 128        # <--- ✅ 保持 128 维起步。对于复杂的类药大分子，128 维能在保证收敛速度的同时大幅节约显存。如果后续想极限刷榜且显存充裕，可提至 256。
num_layers: 6               # <--- ✅ 完美保持：6 层（6次消息传递）已经具备极强的穿透力，足够看透 QMugs 中最长的碳链，再加深反而容易引发过平滑（Over-smoothing）。
cutoff: 10.0                # <--- ✅ 完美保持：10.0 Bohr (5.3 Å) 的黄金物理截断。
max_num_neighbors: 64       # <--- 💡 致命核心补丁：对于 80 原子的体系，10.0 Bohr 范围内经常挤满 40~50 个原子。必须显式将邻居数上限拉高到 64，否则底层图被随机截断后，GotenNet 的等变注意力机制会彻底失效！