name: "ViSNet"
hidden_channels: 256        # <--- ✅ 保持 256。得益于你充足的 48G 显存，256 维能够充分释放 ViSNet 在复杂大分子上的拟合潜力。
num_layers: 6               # <--- ✅ 完美保持：6 层在 ViSNet 中已经具备非常优秀的穿透力，足以覆盖 80 原子的拓扑网络。
num_heads: 8                # <--- 保持标准配置
lmax: 2                     # <--- 保持标准配置 (最高二阶球谐展开)
cutoff: 10.0                # <--- ✅ 完美保持：10.0 Bohr (5.3 Å) 的截断半径，统一基准。
max_num_neighbors: 64       # <--- 💡 致命核心修改：QM9 的 32 绝对不够用！QMugs 的 10.0 Bohr 范围内原子极度拥挤，必须放大到 64 或 96，确保方向向量计算的无死角覆盖！
vertex_type: "Edge"
rbf_type: "expnorm"
num_rbf: 64
activation: "silu"
attn_activation: "silu"