name: "SchNet"
hidden_channels: 128        # <--- ✅ 保持 128 维。SchNet 架构相对轻量，在你的 A6000 上跑 128 维速度会起飞。如果想冲击极限精度，完全可以拉高到 256。
n_interactions: 6           # <--- ✅ 完美保持：6 层（6次卷积传递）已经足够让信息跨越 QMugs 最长碳链的两端，无需再加深。
n_rbf: 300                  # <--- ✅ 完美保持：300 个高斯基函数能对 0 到 10.0 Bohr 的距离进行极其细腻的切分，分辨率拉满。
cutoff: 10.0                # <--- ✅ 完美保持：10.0 Bohr (约 5.3 Å) 的截断半径，囊括丰富的非共价键作用。
max_neighbors: 64           # <--- 💡 致命核心修改：QM9 用 32 是因为它最多才 29 个原子。QMugs 在 10.0 Bohr 半径内极度拥挤，必须放开到 64，否则底层的纯距离卷积会丢失大量化学键和空间位阻信息！