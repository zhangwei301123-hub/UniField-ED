name: "DualCrossattention_visnet"

interaction_radius: 2.0

# ================= 1. ViSNet =================
visnet:
  hidden_channels: 128
  num_heads: 8
  num_layers: 6
  num_rbf: 32
  lmax: 2
  cutoff: 5.0
  max_num_neighbors: 32
  activation: "silu"
  attn_activation: "silu"
  vecnorm_type: "none"
  trainable_vecnorm: false
  rbf_type: "expnorm"
  trainable_rbf: false
  max_z: 100
  vertex_type: "Edge"

# ================= 2. PTv3 =================
ptv3:
  in_channels: 1
  patch_size: 1024
  enc_depths: [2, 2, 2, 6, 2]
  enc_channels: [32, 64, 128, 256, 512]
  dec_channels: [64, 64, 128, 256]

  enc_num_head: [2, 4, 8, 16, 32]

  dec_num_head: [4, 8, 16, 32]
  drop_path_rate: 0.3