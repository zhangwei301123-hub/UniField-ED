name: "PointNext"

# ================== 核心特征 ==================
in_channels: 1              # <--- ✅ 完美：因为 ed 矩阵第 4 列就是唯一的标量特征（电子密度）

# ================== 网络容量 (适配 A6000) ==================
width: 128                  # <--- 💡 核心升级：从 64 提升至 128 (晋升为 PointNext-L 级别)。40,000 个 80 原子的复杂点云，64 维容易欠拟合，128 维能充分压榨你的显卡算力！
blocks: [1, 2, 4, 2, 1]     # <--- 保持结构比例
strides: [1, 2, 2, 2, 2]    # <--- ✅ 完美：对应 1024 个点，逐层下采样 (1024->512->256->128->64)，最终汇聚全局特征。

# ================== 💡 空间感受野 (致命防坑区) ==================
sa_layers: 2
sa_use_res: true
expansion: 4
radius: 1.5                 # <--- 🔪 致命修正：从 0.1 大幅拉升至 1.5！(甚至可以设为 2.0)
nsample: 32                 # <--- 保持 32：在半径范围内寻找 32 个最近点进行局部聚合。

# ================== 正则化 ==================
drop_path_rate: 0.1
dropout: 0.5