name: "DimeNetPP"
hidden_channels: 128        # <--- 保持 128 起步。QMugs 复杂度高，若你用 3090/4090 且显存有富余，可尝试提至 256 冲 SOTA
out_emb_channels: 256       # <--- 同上 (若 hidden 改 256，这里可改 512)
int_emb_size: 64            # <--- 同上 (若 hidden 改 256，这里可改 128)
basis_emb_size: 8
num_layers: 5               # <--- 💡 核心修改一：提升至 5 层！80 原子的长链分子需要更深的网络来保证两端的信息能够互相传递
cutoff: 10.0                # <--- ✅ 完美保持：10.0 Bohr (约 5.3 Å) 足以覆盖二阶几何夹角的计算
max_num_neighbors: 64       # <--- 💡 核心修改二 (致命防坑)：QMugs 局部原子更密集，必须加宽邻居上限，否则底层建图会随机砍断键角关系！
num_spherical: 7
num_radial: 6
envelope_exponent: 5